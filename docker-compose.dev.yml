version: '3.8'

# สำหรับ development ที่ใช้ PostgreSQL (เหมือน production)
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pcg_booking
      POSTGRES_USER: pcg
      POSTGRES_PASSWORD: pcg_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://pcg:pcg_dev_password@db:5432/pcg_booking
      - JWT_SECRET=pcg-dev-secret-key
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
